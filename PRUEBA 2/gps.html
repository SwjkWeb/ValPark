<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Comunidad Valenciana</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Buscar en Valencia...">
        <button onclick="searchLocation()">🔍 Buscar</button>
    </div>

    <div class="route-panel" id="routePanel">
        <h3>Calcular Ruta</h3>
        <input type="text" id="origin" placeholder="Origen (ej: Plaza del Ayuntamiento)">
        <input type="text" id="destination" placeholder="Destino (ej: Ciudad de las Artes)">
        <button onclick="calculateRoute()">📍 Calcular Ruta</button>
        <button onclick="closeRoutePanel()" style="background: linear-gradient(135deg, #6c757d 0%, #495057 100%); margin-top: 5px;">Cerrar</button>
    </div>

    <div class="info-panel">
        <h3>GPS Ciudad de Valencia</h3>
        <p>Valencia</p>
    </div>

    <div id="map"></div>

    <div class="controls">
        <button class="control-btn" onclick="locateMe()" title="Mi ubicación">📍</button>
        <button class="control-btn" onclick="showRoutePanel()" title="Calcular ruta">🚗</button>
        <button class="control-btn" onclick="showAccessibleParking()" title="Aparcamiento accesible">♿</button>
        <button class="control-btn" onclick="map.zoomIn()" title="Zoom +">+</button>
        <button class="control-btn" onclick="map.zoomOut()" title="Zoom -">−</button>
    </div>

    <button class="accessibility-btn" onclick="toggleAccessibility()" title="Modo Alto Contraste">👁️</button>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
    <script src="script.js"></script>
</body>
</html>
